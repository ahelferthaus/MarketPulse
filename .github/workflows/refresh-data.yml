name: Refresh data and deploy

# Regenerates the static JSON payloads the frontend reads, commits them, then
# rebuilds and deploys the site. This is the ONLY place data is "pulled" —
# visitors just read the cached static files, so no work happens per page load.
#
# compute_scores rebuilds the full point-in-time score history (2003 -> today,
# all four markets) from free public sources (yfinance + FRED) in the runner,
# so the deployed payloads are real data. The Bloomberg MCP overlay is
# local-only and silently skipped here (no Terminal in CI).

on:
  schedule:
    # Weekdays at 21:30 UTC — after the US market close (~4:30pm EST / 5:30pm EDT).
    - cron: "30 21 * * 1-5"
  workflow_dispatch: # manual "Run workflow" button in the Actions tab

# Needs contents:write to commit refreshed payloads; pages/id-token to deploy.
permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  refresh-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install payload-generator dependencies
        run: pip install fastapi pydantic pydantic-settings duckdb pandas numpy yfinance httpx

      - name: Compute real scores (2003 -> today, all markets)
        run: python -m backend.jobs.compute_scores --full

      - name: Regenerate static payloads
        run: python -m backend.jobs.generate_frontend_payloads

      - name: Commit refreshed payloads
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend2/public/data
          if git diff --cached --quiet; then
            echo "No payload changes to commit."
          else
            git commit -m "chore: refresh MarketPulse static payloads [skip ci]"
            git push
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend2/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend2
        run: npm ci

      - name: Build
        working-directory: frontend2
        run: npm run build

      - name: Add SPA fallback (404.html)
        working-directory: frontend2
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend2/dist

  deploy:
    needs: refresh-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
